---
- hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  tasks:
    - name: Collect coverage artifacts
      synchronize:
        src: "{{ zuul.project.src_dir }}/distributedcloud-client/{{ item }}"
        dest: "{{ zuul.executor.log_root }}/{{ item }}"
        mode: pull
        copy_links: true
        verify_host: true
      loop:
        - cover/
        - .coverage
      ignore_errors: true
